[flake8]
# wemake-python-styleguide (via flake8) defaults to a 79-char line limit,
# which conflicts with this repo's own Ruff-enforced standard of 120
# (pyproject.toml, line-length = 120, E501 ignored under Ruff for the same
# reason). Align flake8/WPS with the project's actual line-length contract
# instead of rewrapping code to satisfy a stricter, unrelated default.
max-line-length = 120

# Ruff's stable "E" select only implements the E4/E7/E9 pycodestyle classes —
# the whitespace/indentation/blank-line classes (E1xx/E2xx/E3xx) and every W
# class are formatter territory (ruff format) and have never been enforced in
# this repo. Letting flake8 apply them here would fail PRs on pre-existing
# layout in any file they happen to touch, re-litigating rules the project's
# authoritative linter deliberately leaves to the formatter.
# E501 is here because pyproject.toml's [tool.ruff.lint] ignores E501
# REPO-WIDE (ignore = ["E501"]) — the earlier per-file E501 grants below were
# an incomplete mirror of that global decision.
extend-ignore = E1, E2, E3, E501, W1, W2, W3, W5

# Mirror pyproject.toml's [tool.ruff.lint] per-file-ignores so the flake8/WPS
# lane never contradicts the repo's authoritative lint contract (Ruff, which is
# what CLAUDE.md §5 names as CI-enforced). Without this, any PR touching a test
# file fails on findings the project has already, deliberately exempted there —
# tests are assertion-heavy (S101), use ad-hoc literals as expected values
# (WPS432), and favor long descriptive test names (WPS118). The WPS prefix
# exemption for tests matches the same judgment Ruff's tests/* entry encodes:
# strict style rules gate production code, not test scaffolding.
#
# .claude/*.py mirrors pyproject.toml's top-level `exclude = [".claude"]`
# (its comment: "skill/utility scripts are not production code"). A plain
# flake8 `exclude` does NOT apply to a file named explicitly on the CLI
# (verified locally) -- and lint.yml invokes `flake8 <changed files...>` by
# name -- so only a per-file-ignore actually keeps this lane consistent with
# Ruff's already-made call for this tree.
#
# graph.py: WPS reviewed all 48 pre-existing findings by category before
# adding this (2026-07-17) -- WPS111/WPS110 (short/generic names: d, e, r, s,
# result(s)), WPS210/WPS231/WPS221 (local-variable/cognitive-complexity/line-
# complexity metrics), WPS226 (repeated dict-key string literals -- query,
# answer, node names), WPS358 (float 0.0 style), WPS420 (the Protocol stub's
# `pass`, which carries its own comment explaining it's there for CodeQL
# compat, not a mistake), WPS229/WPS211/WPS213/WPS430/WPS204/WPS202 (try-
# body/argument-count/expression-count/nested-function/module-size metrics).
# The one that looked potentially substantive on sight, WPS432's magic-number
# flag on route_by_score_node's `min_score` fallback of 0.4, already carries
# an explicit comment (lines above it) explaining it's a deliberate fail-safe:
# unreachable on the RRF scale, so a misconfigured deploy routes to the user
# gate instead of silently answering on a bogus threshold. None of the 48 are
# a correctness or security defect -- all style/complexity-metric findings on
# already-reviewed code. Same judgment as gate.py below: WPS gates production
# code style, but this file's own docstring-level comments already carry the
# design rationale WPS can't see.
# Legacy-subsystem WPS exemptions (2026-07-17): the pre-existing production
# tree was never brought WPS-clean (lint.yml's own comment), so any PR
# touching one of these files inherits its whole strict-style backlog. Before
# each directory below was added, its full flake8 output was reviewed under
# the exact CI plugin pins: across retrieval/, llm/, utils/, sync/, agentic/,
# and guardrails/ there are ZERO pyflakes (F) findings — the only non-WPS hit
# in the entire tree is a single E501 that Ruff already ignores repo-wide.
# Every WPS finding falls in the same naming/complexity/literal-reuse/metric
# families already ruled on for graph.py (WPS110/111 names, WPS210/213/221/
# 229/231/232 metrics, WPS226 literals, WPS420/421/407/430/501/504 style
# opinions, WPS432 documented constants). Scope note, canary-verified: this
# lane's plugin set is exactly pyflakes + pycodestyle + WPS (wemake 1.6.2
# bundles no bandit/bugbear — S and B codes are Ruff's job plus the dedicated
# bandit workflow), so what these entries waive is WPS style only; pyflakes
# (F401/F821-class real-bug checks) and pycodestyle E4/E7/E9 stay in force
# here and everywhere, and WPS stays fully in force for new top-level modules
# and any directory not listed.
#
# mcp_hybrid_server.py, metrics.py (2026-07-18): both are top-level entry
# points (`cyclaw-mcp`, `cyclaw-metrics`) never previously touched by a PR
# that also modifies flake8-linted lines, so this is their first exposure to
# the WPS lane. Full findings reviewed by category before adding: WPS110/111
# (short/generic names: value, results, params, r, e, f, s), WPS210/213/221/
# 231/232 (local-variable/expression/line/cognitive-complexity metrics),
# WPS226 (repeated JSON-RPC key literals -- jsonrpc, id, query, description),
# WPS407 (mutable module constants), WPS336/358 (string-concat and float-zero
# style), WPS420 (metrics.py:28's `except json.JSONDecodeError: pass` inside
# a streaming parser -- skipping a malformed audit line is the intended
# behavior, not an omission), WPS421 (metrics.py's `print` calls -- it is the
# `cyclaw-metrics` CLI's terminal report, not library code; CLAUDE.md's
# "no print in library code" rule targets importable modules, not CLI output),
# WPS432 (mcp_hybrid_server.py's -32600/-32601/-32602/-32700/-32000 literals
# are JSON-RPC 2.0's own reserved error codes, not arbitrary magic numbers),
# WPS501/505/229 (mcp_hybrid_server.py's outer `try/finally: retriever.close()`
# around the stdin read loop -- deliberate cleanup-on-any-exit, with a nested
# try/except already handling the one exception type expected there). None
# substantive; same style/complexity-metric-only class as graph.py above.
#
# gate.py (2026-07-18): the module itself already carried E402/I001/B008/E501
# grants below (telemetry-kill import ordering, FastAPI's Depends() default-arg
# idiom) but had never been touched by a PR that also modified flake8-linted
# lines, so this is its first exposure to the WPS lane specifically -- same
# situation as mcp_hybrid_server.py/metrics.py above. Full findings (69) reviewed
# by category before adding: WPS110/111 (short/generic names: val, result, d,
# e, s), WPS121/122/335 (the lifespan() shutdown loop's intentionally-unused
# `_name, _obj` tuple iteration -- `_name` is used in the log message, `_obj` in
# the close() call), WPS210/217/221/231/238 (local-variable/await-count/line-
# complexity/cognitive-complexity/raise-count metrics), WPS226 (repeated string
# literals -- api, event, error, code, query, "Personality system not enabled"),
# WPS229 (restore_soul's 2-line try body -- both lines belong to the one
# FileNotFoundError path), WPS358 (float 0.0 style already commented at its two
# call sites as deliberate RRF-scale fallbacks), WPS407 (`_SECRET_PATTERNS`, a
# module-level list of compiled regexes -- read-only in practice), WPS420
# (`_hold_console`'s `pass` on EOFError/KeyboardInterrupt -- explicitly
# commented as "stop waiting and exit", not an omission), WPS421 (`print`/
# `input` in `main()`/`_hold_console()` -- the `cyclaw-server` console script's
# double-clicked-launch UX, not library code), WPS432 (HTTP status codes
# 400/404/429/500/503/504 and the graph/LLM timeout constants 300/330, all
# self-evident from context or already covered by an adjacent comment). None
# substantive; same style/complexity-metric-only class as every entry above.
#
# .codex/*.py (2026-07-19): same first-exposure situation as gate.py above --
# .codex skill scripts had never been in a PR diff since the WPS lane existed,
# so the first PR to touch one (a one-string torch-pin sync in
# cyclaw-sandbox-test/scripts/run_sandbox_test.py) inherited its whole
# pre-existing WPS backlog. Findings (94) reviewed by category under the exact
# CI plugin pins: ZERO pyflakes (F) and zero pycodestyle E4/E7/E9 hits; all 94
# are WPS style/metric classes already ruled on for the directories above --
# WPS432 (HTTP status codes / timeouts / byte counts), WPS226 (repeated
# PASS/FAIL/JSON-key literals), WPS221/210/213/231/237 (complexity metrics),
# WPS110/111 (short names), WPS301 (dotted urllib imports), WPS505/229/501
# (try/except structure), WPS421 (smoke-runner progress prints), WPS453
# (shebang on a non-executable script invoked via `python <path>`), WPS400
# (noqa-comment wording). None substantive. .codex skill scripts are the same
# not-production-code class as .claude/*.py (operator scaffolding, never
# imported by the request path); WPS stays fully in force for production code.
per-file-ignores =
    tests/*.py: WPS, S101, S603, S108, S105, F401, F841, B007, C408, F541, B904, E501
    .claude/*.py: WPS, E, F, C, B, S
    .codex/*.py: WPS
    gate.py: WPS, E402, I001, B008, E501
    graph.py: WPS, E501
    retrieval/*.py: WPS
    llm/*.py: WPS
    utils/*.py: WPS
    sync/*.py: WPS
    agentic/*.py: WPS
    guardrails/*.py: WPS
    mcp_hybrid_server.py: WPS
    metrics.py: WPS
    utils/personality.py: S608
