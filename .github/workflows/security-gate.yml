# ==============================================================================
# CyClaw • Native Security Gate (Ruff + Bandit + SARIF)
#
# This is the invariant-enforcing gate. Fast, controllable, no token, no bloat.
# Replaces heavy Codacy kitchen-sink for Python + security focus.
# Aligns with: RAG-first, topology=policy, audit convergence, low-noise execution.
# ==============================================================================

name: CyClaw • Native Security Gate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit ruff safety

      - name: Run Ruff (lint + security)
        run: ruff check . --output-format sarif > ruff.sarif
        continue-on-error: true

      - name: Run Bandit (security scan)
        run: bandit -r . -f sarif -o bandit.sarif || true

      - name: Run Safety (dependency check)
        run: safety check --output sarif > safety.sarif || true

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ruff.sarif
          category: ruff

      - name: Upload Bandit SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bandit.sarif
          category: bandit

      - name: Upload Safety SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: safety.sarif
          category: safety

      - name: Archive reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: '*.sarif'
          retention-days: 7
