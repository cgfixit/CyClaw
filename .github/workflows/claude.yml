name: Claude Code (PR Comments)

# Out-of-band assistance tool only.
# This workflow allows @claude mentions on PRs to trigger review assistance.
# It is intentionally limited to read-only repository access and human-initiated triggers only.
# It does NOT participate in core governance, invariants, or agentic paths.
# add comment write to pr ability for when i @ it

on:
  issue_comment:
    types: [created]

concurrency:
  group: claude-pr-comment-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: true

jobs:
  claude:
    name: Claude Code Review
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Only you can trigger this, and only on open Pull Requests
    if: |
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '@claude') &&
      github.event.comment.user.login == 'CGFixIT' &&
      github.event.issue.state == 'open'

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run Claude Code
        uses: anthropics/claude-code-action@fa7e2f0a29a126f0b81cdcf360561b36e44cf608
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
