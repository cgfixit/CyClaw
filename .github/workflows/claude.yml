name: Claude Code (PR Comments)

on:
  issue_comment:
    types: [created]

# Cancel superseded @claude runs on the same issue thread; keep main history.
concurrency:
  group: claude-pr-comment-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: true

jobs:
  claude:
    name: Claude Code
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '@claude') &&
      github.event.comment.user.login == 'CGFixIT'

    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Claude Code
        uses: anthropics/claude-code-action@fad22eb3fa582b7357fc0ea48af6645851b884fd  # beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
