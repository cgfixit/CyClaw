name: Analyze (${{ matrix.language }})
runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
# keep permissions minimal and explicit for CodeQL
permissions:
  security-events: write
  contents: read
  packages: read

strategy:
  fail-fast: false
  matrix:
    include:
      - language: actions
        build-mode: none
      - language: python
        build-mode: none
    # If you need additional languages, add them here (e.g. javascript-typescript)

timeout-minutes: 120

steps:
  - name: Checkout repository
    uses: actions/checkout@v4
    with:
      # ensure the full repository is available for CodeQL (some analyses need full history)
      fetch-depth: 0

  # Optional: add runtime/tool setup steps before init if your build requires them (example for Python)
  # - name: Setup Python
  #   if: matrix.language == 'python'
  #   uses: actions/setup-python@v4
  #   with:
  #     python-version: '3.x'

  - name: Initialize CodeQL
    uses: github/codeql-action/init@v4
    with:
      languages: ${{ matrix.language }}
      build-mode: ${{ matrix.build-mode }}
      # Example: enable recommended query pack(s). Uncomment or customize as needed.
      # queries: security-and-quality

  - name: Run manual build steps
    if: matrix.build-mode == 'manual'
    shell: bash
    run: |
      echo "Replace this with your build commands (make, mvn, dotnet build, etc.)"
      exit 1

  - name: Perform CodeQL Analysis
    uses: github/codeql-action/analyze@v4
    with:
      category: "/language:${{ matrix.language }}"
