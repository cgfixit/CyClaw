name: "CodeQL Advanced"

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "docs/**"
      - ".github/**"
      - ".workflow/**"
      - ".claude/**"
      - "tests/**"

  pull_request:
    branches: ["main"]
  schedule:
    - cron: '34 15 * * 1'
  workflow_dispatch:

jobs:
  analyze:
    concurrency:
      group: codeql-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: python
            build-mode: none
          # Add other language entries only if your repo contains them.
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3  # v6
        with:
          fetch-depth: 0

      - name: Setup Python (used for analysis runtime / import resolution)
        if: matrix.language == 'python'
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c  # v6
        with:
          python-version: '3.x'

      # Install deps only when build-mode is manual (CodeQL needs to trace the build)
      - name: Install dependencies
        if: matrix.language == 'python' && matrix['build-mode'] == 'manual'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # Run the extended query suite (default security queries PLUS the
          # security-and-quality pack) so CodeQL also surfaces maintainability
          # and reliability issues, not just the smaller default security set.
          queries: security-and-quality

      - name: Run manual build steps
        if: matrix.build-mode == 'manual'
        shell: bash
        run: |
          echo "Replace this with your build commands (make, mvn, dotnet build, etc.)"
          exit 1

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
