# ==============================================================================
# CyClaw CI — Tests + Coverage + Reproducible Install Gate
# v2 hardening (June 2026):
#   - Early pip upgrade to >=26.1.2 (eliminates 4 pip CVEs in CI env per #71 analysis)
#   - Explicit hermetic prepare (mkdirs, minimal soul.md, env var) cross-platform
#   - Real RAG smoke validates ChromaDB (version pinned in constraints.txt) + BM25 + RRF on committed corpus
#   - Coverage scoped to exercised modules only
#   - Aligns with v1.4.0 invariants (reproducible CI security gate, Python 3.12, stable Chroma pin)
#   - Cross-ref: cyclaw-advisor + python-development best practices for observable, testable CI
# ==============================================================================

name: CyClaw CI (Tests + Coverage + Gate)

on:
  push:
    branches: [ main, cc, feature/CyClaw-Agent ]
  pull_request:
    branches: [ main, cc, feature/CyClaw-Agent ]

# Cancel superseded runs: when new commits are pushed to the same PR/branch,
# in-progress runs for that ref are cancelled instead of running to completion
# on stale code. Pushes to main are exempt (cancel-in-progress is false there)
# so every commit landed on main keeps full, uninterrupted CI history.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    # Bound every run: the install step pulls torch + chromadb + sentence-transformers
    # and the RAG smoke spins up an embedded ChromaDB. A hung download or a wedged
    # service should fail fast, not idle until GitHub's 6-hour default and burn
    # Actions minutes on both OS legs of the matrix.
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.12'
          cache: 'pip'
          # Key the pip download cache to the dependency manifests. When these are
          # unchanged, pip restores wheels (incl. the heavy torch/chromadb/
          # sentence-transformers downloads) from cache instead of re-fetching --
          # the biggest win on the slower windows-latest leg. Conservative: this
          # only caches the pip download dir, so a stale/missing cache degrades to
          # a normal install, never a broken one.
          cache-dependency-path: |
            requirements.txt
            constraints.txt
            pyproject.toml

      - name: Upgrade pip (CVE mitigation for CI env only)
        shell: bash
        run: |
          python -m pip install --upgrade "pip>=26.1.2"

      - name: Cache torch CPU wheel
        # Torch (~2GB) is pinned infrequently; caching its wheel separately means
        # a requirements.txt or constraints.txt change only busts the lighter
        # runtime-deps cache (via the setup-python pip cache), not this one.
        # The wheel is downloaded once per (os, pin) pair and reused on every
        # subsequent run until the pin changes in pyproject.toml.
        id: torch-wheel-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: .torch-wheels
          key: torch-cpu-2.12.1-${{ runner.os }}-py312
          restore-keys: |
            torch-cpu-2.12.1-${{ runner.os }}-

      - name: Download torch wheel (cache miss only)
        if: steps.torch-wheel-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          # CVE-2025-32434 (weights_only=True RCE bypass) was fixed in torch 2.6.0.
          # 2.12.1 is within the patched range. --no-deps avoids pulling the default
          # CUDA build; only the CPU wheel is fetched and cached.
          pip download "torch==2.12.1+cpu" \
            --index-url https://download.pytorch.org/whl/cpu \
            --no-deps -d .torch-wheels

      - name: Install deps (torch CPU + project + test tools)
        shell: bash
        run: |
          # Install torch from the per-version local wheel (no network fetch when
          # cache hits). --no-index / --find-links keeps pip from querying the
          # PyTorch index on cache-hit runs, speeding up the step significantly.
          pip install --no-index --no-deps --find-links .torch-wheels "torch==2.12.1+cpu"
          pip install -r requirements.txt -c constraints.txt pytest pytest-cov

      - name: Prepare hermetic test env
        shell: bash
        run: |
          # data/corpus/cyclaw_overview.md is committed — the RAG smoke test indexes it.
          # Minimal soul.md + env var for gate tests. No prod secrets.
          mkdir -p data/personality index logs
          echo '# Soul' > data/personality/soul.md
          echo 'GROK_API_KEY=dummy' >> $GITHUB_ENV

      - name: RAG Query Smoke (ChromaDB + BM25 + RRF)
        shell: bash
        run: |
          # Validates full retrieval path against committed corpus.
          # Fails CI if min_score gate or hybrid fusion broken.
          # (Unit tests + coverage run in the next step.)
          python -m tests.ci_rag_smoke

      - name: Run tests + coverage
        shell: bash
        run: |
          # tests/ glob auto-discovers all test_*.py files — new test files are
          # picked up without a manual ci.yml edit. ci_rag_smoke.py is excluded
          # by pytest's default discovery pattern (it doesn't match test_*.py)
          # and runs separately in the RAG smoke step above.
          pytest tests/ \
            -q --tb=short \
            --cov=gate \
            --cov=gate_ops \
            --cov=utils.sanitizer \
            --cov=utils.config_validation \
            --cov=utils.errors \
            --cov=utils.logger \
            --cov=utils.personality \
            --cov=utils.personality_db \
            --cov=utils.ratelimit \
            --cov=utils.health \
            --cov=utils.ops_runner \
            --cov=utils.guardrail_bridge \
            --cov=llm.client \
            --cov=graph \
            --cov=retrieval.embeddings \
            --cov=retrieval.hybrid_search \
            --cov=retrieval.indexer \
            --cov=retrieval.stemmer \
            --cov=retrieval.vector_store \
            --cov=retrieval.clear_cache \
            --cov=mcp_hybrid_server \
            --cov=metrics \
            --cov=sync.selftest \
            --cov=sync.runner \
            --cov=sync.config \
            --cov=sync.filters \
            --cov=sync.cli \
            --cov=sync.scheduler \
            --cov=agentic \
            --cov=guardrails \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing

      - name: Upload Coverage Report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-${{ matrix.os }}
          path: |
            htmlcov/
            coverage.xml
          retention-days: 30

      - name: Final status
        run: echo "CI workflow completed on ${{ matrix.os }} (reproducible gate passed)"

  # Optional Deep Agents contract check. This deliberately installs only the
  # lightweight agentic dependency set; default runtime CI remains offline-first.
  deepagents-harness:
    name: deepagents-harness
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            pyproject.toml
            constraints.txt

      - name: Install optional Deep Agents harness dependencies
        run: |
          python -m pip install --upgrade "pip>=26.1.2"
          pip install -c constraints.txt pyyaml httpx langgraph langchain-core pytest pytest-asyncio
          pip install -c constraints.txt deepagents langchain-openai

      - name: Verify Deep Agents HITL and fixture runner
        run: |
          pytest tests/test_agentic_harness_phase679.py tests/test_agentic_deepagent_optional.py -q --tb=short

      - name: Audit optional Deep Agents dependencies
        run: |
          pip install pip-audit
          printf 'deepagents==0.6.12\nlangchain==1.3.11\nlangchain-openai==1.3.3\n' > /tmp/deepagents-requirements.txt
          pip-audit -r /tmp/deepagents-requirements.txt

  # ==============================================================================
  # Postgres backend job (opt-in DB paths)
  # Exercises the LIVE psycopg/pgvector connect+execute paths that the default
  # matrix can only skip: the soul DB over Postgres, the rate limiter over
  # Postgres, and the pgvector vector store. Ubuntu-only — service containers do
  # not run on the windows-latest leg. Uses pgvector/pgvector:pg16 (a superset of
  # postgres:16 that ships the `vector` extension). Lean deps: torch / chromadb /
  # sentence-transformers / fastapi stay lazy and are not needed; the job installs
  # only the import-time deps the shared tests/conftest.py pulls in (rank-bm25 + nltk
  # via retrieval.hybrid_search) plus the Postgres drivers. sslmode=disable because
  # the service is a trusted same-host container.
  # ==============================================================================
  postgres-backend:
    name: postgres-backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: cyclaw
          POSTGRES_PASSWORD: cyclaw
          POSTGRES_DB: cyclaw
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cyclaw"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Loopback DSN for the ephemeral CI service container, not debug code.
      CYCLAW_DB_URL: postgresql://cyclaw:cyclaw@127.0.0.1:5432/cyclaw  # DevSkim: ignore DS162092
      CYCLAW_DB_SSLMODE: disable
      GROK_API_KEY: dummy
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            constraints.txt
            pyproject.toml

      - name: Upgrade pip (CVE mitigation for CI env only)
        run: python -m pip install --upgrade "pip>=26.1.2"

      - name: Install Postgres-backend deps
        run: |
          # Postgres drivers + the import-time deps tests/conftest.py needs
          # (retrieval.hybrid_search → rank-bm25, nltk; numpy backs rank-bm25).
          # Constraints pin psycopg/psycopg-binary 3.2.13, pgvector 0.4.2, and the
          # rest to the project versions. PorterStemmer needs no nltk_data download.
          pip install -c constraints.txt 'psycopg[binary]' pgvector pyyaml rank-bm25 nltk numpy pytest

      - name: Run live Postgres / pgvector backend tests
        run: |
          pytest \
            tests/test_personality_postgres.py \
            tests/test_ratelimit_postgres.py \
            tests/test_pgvector_store.py \
            -q --tb=short

      - name: Final status
        run: echo "Postgres backend tests passed (soul DB + rate limiter + pgvector)"

  # ==============================================================================
  # Skill verification matrix (new in feature/CyClaw-Agent)
  # Runs every .claude/skills/*/verify.sh and smoke.sh in parallel.
  # This enforces that all skills (including new agentic/memory ones) stay
  # healthy and respect the governance invariants.
  # ==============================================================================
  # A matrix cannot reference a step output from its own job (the matrix is
  # evaluated before any step runs). Correct pattern: a discover job emits the
  # skill list as an output, then the matrix job consumes it via `needs`.
  discover-skills:
    name: discover-skills
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      skills: ${{ steps.discover.outputs.skills }}
      has_skills: ${{ steps.discover.outputs.has_skills }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Discover skills with verify/smoke scripts
        id: discover
        run: |
          SKILLS=$(find .claude/skills -maxdepth 1 -mindepth 1 -type d | while read -r d; do
            if [ -f "$d/verify.sh" ] || [ -f "$d/smoke.sh" ]; then
              basename "$d"
            fi
          done | jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "skills=$SKILLS" >> "$GITHUB_OUTPUT"
          if [ "$SKILLS" = "[]" ]; then
            echo "has_skills=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_skills=true" >> "$GITHUB_OUTPUT"
          fi
          echo "Discovered skills: $SKILLS"

  verify-skills:
    name: verify-skills (${{ matrix.skill }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: discover-skills
    # Skip cleanly when no skill ships a verify/smoke script (empty matrix).
    if: needs.discover-skills.outputs.has_skills == 'true'
    # These skill scripts are full app-runtime e2e smokes (they build the index
    # and launch the uvicorn server), not lightweight self-tests. They are run
    # with the full environment below, but kept NON-BLOCKING (continue-on-error):
    # the authoritative pass/fail gate is the `test` job's unit suite + RAG smoke.
    # This surfaces runtime regressions as a visible signal without gating merges
    # on environment-heavy e2e that can be flaky on shared runners.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        skill: ${{ fromJson(needs.discover-skills.outputs.skills) }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            constraints.txt
            pyproject.toml

      - name: Cache torch CPU wheel
        # Same cache the `test` job uses (identical key): without it every leg of
        # this skill matrix re-downloaded the ~2 GB torch wheel from the PyTorch
        # index on every run — N legs × 2 GB of avoidable network per push.
        id: torch-wheel-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: .torch-wheels
          key: torch-cpu-2.12.1-${{ runner.os }}-py312
          restore-keys: |
            torch-cpu-2.12.1-${{ runner.os }}-

      - name: Download torch wheel (cache miss only)
        if: steps.torch-wheel-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          pip download "torch==2.12.1+cpu" \
            --index-url https://download.pytorch.org/whl/cpu \
            --no-deps -d .torch-wheels

      - name: Install deps (torch CPU + project)
        shell: bash
        run: |
          python -m pip install --upgrade "pip>=26.1.2"
          pip install --no-index --no-deps --find-links .torch-wheels "torch==2.12.1+cpu"
          pip install -r requirements.txt -c constraints.txt
          # Some skill scripts invoke `python3.12` explicitly; ensure it resolves.
          command -v python3.12 >/dev/null 2>&1 || sudo ln -sf "$(command -v python)" /usr/local/bin/python3.12

      - name: Prepare hermetic env
        shell: bash
        run: |
          # NOTE: do not stub soul.md here. The committed data/personality/soul.md
          # is the real artifact, and skill verify scripts (e.g.
          # sandbox-runtime-verification/verify.sh) back it up, stub it for an
          # early stage, then restore the real file before launching the server.
          # Overwriting it with a 7-char '# Soul' stub here means verify.sh backs
          # up the stub and "restores" 7 chars, so /soul returns near-empty text
          # and the terminal.html emulation's non-empty soul assertion fails.
          mkdir -p data/personality index logs
          echo 'GROK_API_KEY=dummy' >> "$GITHUB_ENV"
          # CYCLAW_API_KEY needed for GET /soul smoke check (now auth-gated).
          # This is a non-secret CI smoke value — loopback-only, ephemeral.
          echo 'CYCLAW_API_KEY=smoke-test-key-ci' >> "$GITHUB_ENV"

      - name: Run verify.sh if present
        if: hashFiles(format('.claude/skills/{0}/verify.sh', matrix.skill)) != ''
        run: |
          echo "Running verify for ${{ matrix.skill }}"
          bash ".claude/skills/${{ matrix.skill }}/verify.sh"

      - name: Run smoke.sh if present
        if: hashFiles(format('.claude/skills/{0}/smoke.sh', matrix.skill)) != ''
        run: |
          echo "Running smoke for ${{ matrix.skill }}"
          bash ".claude/skills/${{ matrix.skill }}/smoke.sh"
