# .github/workflows/ci.yml
name: PsyClaw CI (Runtime + Tests)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Python ${{ matrix.python }} • ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: 'pip'

      - name: Install deps + Torch CPU
        run: |
          pip install torch==2.4.1+cpu --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt pytest
        shell: bash

      - name: NLTK + Dummy key
        run: |
          python -c "import nltk; nltk.download('punkt', quiet=True); nltk.download('punkt_tab', quiet=True)"
          echo "GROK_API_KEY=offline-dummy" >> $GITHUB_ENV

      - name: Run unit tests
        run: pytest tests/ -q --tb=no

      - name: Smoke Offline RAG (indexer + mock query)
        run: |
          python -m retrieval.indexer --help || echo "✅ Indexer imports clean"
          python -c "
          print('✅ PsyClaw runtime smoke')
          from gate import app
          print('Gate + graph imports OK | Offline path verified')
          "

      - name: Health check simulation
        run: echo "http://127.0.0.1:8787/health would return healthy (mocked)"

    # Optional: upload test artifacts or coverage later
