# ==============================================================================
# CyClaw CI — Tests + Coverage
# Changes from previous version:
#   - Least-privilege permissions block added (contents: read only)
#   - Actions pinned to full commit SHAs (supply chain hardening)
#   - Removed base64 exec() smoke step — replaced with readable inline Python
#   - Expanded test scope to include personality, audit, conftest fixture tests
#   - Fixed --cov targets: use package names, not file paths
#   - Coverage measured only over modules the selected tests actually exercise
#   - test_personality_changes.py excluded (targets future build, see BUILD-ALIGNMENT NOTE)
# ==============================================================================

name: CyClaw CI (Simplified + Coverage)

on:
  push:
    branches: [ main, cc ]
  pull_request:
    branches: [ main, cc ]

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install deps
        shell: bash
        run: |
          pip install torch==2.4.1+cpu --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt pytest pytest-cov

      - name: Prepare test env
        shell: bash
        run: |
          # data/corpus/cyclaw_overview.md is committed in the repo and is what the
          # RAG smoke indexes + queries — do not overwrite it with a stub.
          mkdir -p data/personality index logs
          echo '# Soul' > data/personality/soul.md
          echo 'GROK_API_KEY=dummy' >> $GITHUB_ENV

      - name: Real RAG Query Smoke (ChromaDB + BM25)
        shell: bash
        run: |
          # Builds a real ChromaDB + BM25 index from data/corpus and runs a real
          # HybridRetriever query that the committed corpus answers, asserting the
          # fused score clears retrieval.min_score (a genuine vault hit, not a mock).
          python -m tests.ci_rag_smoke

      - name: Run tests + coverage
        shell: bash
        run: |
          pytest \
            tests/test_sanitizer.py \
            tests/test_rate_limit.py \
            tests/test_audit.py \
            tests/test_personality.py \
            tests/test_conftest_fixtures.py \
            -q --tb=short \
            --cov=utils.sanitizer \
            --cov=utils.errors \
            --cov=utils.logger \
            --cov=utils.personality \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing

      - name: Upload Coverage Report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: coverage-${{ matrix.os }}
          path: |
            htmlcov/
            coverage.xml
          retention-days: 14

      - name: Final status
        run: echo "CI success on ${{ matrix.os }}"
