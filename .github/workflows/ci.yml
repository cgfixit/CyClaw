# ==============================================================================
# CyClaw CI — Tests + Coverage + Reproducible Install Gate
# v2 hardening (June 2026):
#   - Early pip upgrade to >=26.1.2 (eliminates 4 pip CVEs in CI env per #71 analysis)
#   - Explicit hermetic prepare (mkdirs, minimal soul.md, env var) cross-platform
#   - Real RAG smoke validates ChromaDB 1.5.6 + BM25 + RRF on committed corpus
#   - Coverage scoped to exercised modules only
#   - Aligns with v1.4.0 invariants (reproducible CI security gate, Python 3.12, stable Chroma pin)
#   - Cross-ref: cyclaw-advisor + python-development best practices for observable, testable CI
# ==============================================================================

name: CyClaw CI (Tests + Reproducible Gate)

on:
  push:
    branches: [ main, cc, feature/CyClaw-Agent ]
  pull_request:
    branches: [ main, cc, feature/CyClaw-Agent ]

# Cancel superseded runs: when new commits are pushed to the same PR/branch,
# in-progress runs for that ref are cancelled instead of running to completion
# on stale code. Pushes to main are exempt (cancel-in-progress is false there)
# so every commit landed on main keeps full, uninterrupted CI history.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    # Bound every run: the install step pulls torch + chromadb + sentence-transformers
    # and the RAG smoke spins up an embedded ChromaDB. A hung download or a wedged
    # service should fail fast, not idle until GitHub's 6-hour default and burn
    # Actions minutes on both OS legs of the matrix.
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.12'
          cache: 'pip'
          # Key the pip download cache to the dependency manifests. When these are
          # unchanged, pip restores wheels (incl. the heavy torch/chromadb/
          # sentence-transformers downloads) from cache instead of re-fetching --
          # the biggest win on the slower windows-latest leg. Conservative: this
          # only caches the pip download dir, so a stale/missing cache degrades to
          # a normal install, never a broken one.
          cache-dependency-path: |
            requirements.txt
            constraints.txt
            pyproject.toml

      - name: Upgrade pip (CVE mitigation for CI env only)
        shell: bash
        run: |
          python -m pip install --upgrade "pip>=26.1.2"

      - name: Install deps (torch CPU + project + test tools)
        shell: bash
        run: |
          # CVE-2025-32434 (weights_only=True RCE bypass) was fixed in torch 2.6.0.
          # 2.12.1 is within the patched range; install order still matters so the
          # CPU wheel from the PyTorch index wins over the default CUDA build.
          pip install torch==2.12.1+cpu --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt pytest pytest-cov

      - name: Prepare hermetic test env
        shell: bash
        run: |
          # data/corpus/cyclaw_overview.md is committed — the RAG smoke test indexes it.
          # Minimal soul.md + env var for gate tests. No prod secrets.
          mkdir -p data/personality index logs
          echo '# Soul' > data/personality/soul.md
          echo 'GROK_API_KEY=dummy' >> $GITHUB_ENV

      - name: RAG Query Smoke (ChromaDB 1.5.6 + BM25 + RRF)
        shell: bash
        run: |
          # Validates full retrieval path against committed corpus.
          # Fails CI if min_score gate or hybrid fusion broken.
          # (Unit tests + coverage run in the next step.)
          python -m tests.ci_rag_smoke

      - name: Run tests + coverage
        shell: bash
        run: |
          # test_security.py guards the S3 BM25-pickle-RCE rejection (JSON-only
          # loader) and the S9 API-key auth on /soul/* endpoints. It mocks
          # ChromaDB and uses FastAPI's TestClient, so it needs no live service
          # and runs in the same hermetic env as the rest of the suite.
          pytest \
            tests/test_sanitizer.py \
            tests/test_security.py \
            tests/test_config_validation.py \
            tests/test_rate_limit.py \
            tests/test_audit.py \
            tests/test_client.py \
            tests/test_personality.py \
            tests/test_conftest_fixtures.py \
            tests/test_stemmer.py \
            tests/test_hybrid_search.py \
            tests/test_indexer.py \
            tests/test_embeddings.py \
            tests/test_graph.py \
            tests/test_gate.py \
            tests/test_telemetry_kill.py \
            tests/test_health.py \
            tests/test_mcp_server.py \
            tests/test_metrics.py \
            tests/test_personality_changes.py \
            tests/test_sync_config.py \
            tests/test_sync_filters.py \
            tests/test_sync_runner.py \
            tests/test_sync_cli.py \
            tests/test_sync_scheduler.py \
            tests/test_sync_selftest.py \
            tests/test_agentic_config.py \
            tests/test_agentic_cli.py \
            tests/test_agentic_registry.py \
            tests/test_agentic_isolation.py \
            tests/test_agentic_selftest.py \
            tests/test_agentic_writer.py \
            tests/test_agentic_gh_client.py \
            tests/test_agentic_context.py \
            tests/test_fsconnect_config.py \
            tests/test_fsconnect_pathsafe.py \
            tests/test_fsconnect_client.py \
            tests/test_fsconnect_writer.py \
            tests/test_fsconnect_indexer.py \
            tests/test_fsconnect_selftest.py \
            tests/test_fsconnect_cli.py \
            tests/test_sqlconnect_config.py \
            tests/test_sqlconnect_client.py \
            tests/test_sqlconnect_cli.py \
            tests/test_rag_integration.py \
            tests/test_startup_robustness.py \
            tests/test_clear_cache.py \
            tests/test_ops_runner.py \
            -q --tb=short \
            --cov=gate \
            --cov=utils.sanitizer \
            --cov=utils.config_validation \
            --cov=utils.errors \
            --cov=utils.logger \
            --cov=utils.personality \
            --cov=utils.personality_db \
            --cov=utils.ratelimit \
            --cov=utils.health \
            --cov=utils.ops_runner \
            --cov=llm.client \
            --cov=graph \
            --cov=retrieval.embeddings \
            --cov=retrieval.hybrid_search \
            --cov=retrieval.indexer \
            --cov=retrieval.stemmer \
            --cov=retrieval.clear_cache \
            --cov=mcp_hybrid_server \
            --cov=metrics \
            --cov=sync.selftest \
            --cov=sync.runner \
            --cov=sync.config \
            --cov=sync.filters \
            --cov=sync.cli \
            --cov=sync.scheduler \
            --cov=agentic \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing

      - name: Upload Coverage Report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-${{ matrix.os }}
          path: |
            htmlcov/
            coverage.xml
          retention-days: 30

      - name: Final status
        run: echo "CI workflow completed on ${{ matrix.os }} (reproducible gate passed)"

  # ==============================================================================
  # Skill verification matrix (new in feature/CyClaw-Agent)
  # Runs every .claude/skills/*/verify.sh and smoke.sh in parallel.
  # This enforces that all skills (including new agentic/memory ones) stay
  # healthy and respect the governance invariants.
  # ==============================================================================
  # A matrix cannot reference a step output from its own job (the matrix is
  # evaluated before any step runs). Correct pattern: a discover job emits the
  # skill list as an output, then the matrix job consumes it via `needs`.
  discover-skills:
    name: discover-skills
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      skills: ${{ steps.discover.outputs.skills }}
      has_skills: ${{ steps.discover.outputs.has_skills }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Discover skills with verify/smoke scripts
        id: discover
        run: |
          SKILLS=$(find .claude/skills -maxdepth 1 -mindepth 1 -type d | while read -r d; do
            if [ -f "$d/verify.sh" ] || [ -f "$d/smoke.sh" ]; then
              basename "$d"
            fi
          done | jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "skills=$SKILLS" >> "$GITHUB_OUTPUT"
          if [ "$SKILLS" = "[]" ]; then
            echo "has_skills=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_skills=true" >> "$GITHUB_OUTPUT"
          fi
          echo "Discovered skills: $SKILLS"

  verify-skills:
    name: verify-skills (${{ matrix.skill }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: discover-skills
    # Skip cleanly when no skill ships a verify/smoke script (empty matrix).
    if: needs.discover-skills.outputs.has_skills == 'true'
    # These skill scripts are full app-runtime e2e smokes (they build the index
    # and launch the uvicorn server), not lightweight self-tests. They are run
    # with the full environment below, but kept NON-BLOCKING (continue-on-error):
    # the authoritative pass/fail gate is the `test` job's unit suite + RAG smoke.
    # This surfaces runtime regressions as a visible signal without gating merges
    # on environment-heavy e2e that can be flaky on shared runners.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        skill: ${{ fromJson(needs.discover-skills.outputs.skills) }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            constraints.txt
            pyproject.toml

      - name: Install deps (torch CPU + project)
        shell: bash
        run: |
          python -m pip install --upgrade "pip>=26.1.2"
          pip install torch==2.12.1+cpu --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          # Some skill scripts invoke `python3.12` explicitly; ensure it resolves.
          command -v python3.12 >/dev/null 2>&1 || sudo ln -sf "$(command -v python)" /usr/local/bin/python3.12

      - name: Prepare hermetic env
        shell: bash
        run: |
          # NOTE: do not stub soul.md here. The committed data/personality/soul.md
          # is the real artifact, and skill verify scripts (e.g.
          # sandbox-runtime-verification/verify.sh) back it up, stub it for an
          # early stage, then restore the real file before launching the server.
          # Overwriting it with a 7-char '# Soul' stub here means verify.sh backs
          # up the stub and "restores" 7 chars, so /soul returns near-empty text
          # and the terminal.html emulation's non-empty soul assertion fails.
          mkdir -p data/personality index logs
          echo 'GROK_API_KEY=dummy' >> "$GITHUB_ENV"
          # CYCLAW_API_KEY needed for GET /soul smoke check (now auth-gated).
          # This is a non-secret CI smoke value — loopback-only, ephemeral.
          echo 'CYCLAW_API_KEY=smoke-test-key-ci' >> "$GITHUB_ENV"

      - name: Run verify.sh if present
        if: hashFiles(format('.claude/skills/{0}/verify.sh', matrix.skill)) != ''
        run: |
          echo "Running verify for ${{ matrix.skill }}"
          bash ".claude/skills/${{ matrix.skill }}/verify.sh"

      - name: Run smoke.sh if present
        if: hashFiles(format('.claude/skills/{0}/smoke.sh', matrix.skill)) != ''
        run: |
          echo "Running smoke for ${{ matrix.skill }}"
          bash ".claude/skills/${{ matrix.skill }}/smoke.sh"
