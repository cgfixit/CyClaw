name: PsyClaw CI (Simplified + Coverage)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install deps
        shell: bash
        run: |
          pip install torch==2.4.1+cpu --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt pytest pytest-cov

      - name: Prepare minimal test env
        shell: bash
        run: |
          mkdir -p data/corpus data/personality index logs
          echo '# Test corpus' > data/corpus/test.md
          echo '# Soul' > data/personality/soul.md
          echo 'GROK_API_KEY=dummy' >> $GITHUB_ENV

      - name: Emulated RAG Query Smoke
        shell: bash
        run: |
          python -c "import base64; exec(base64.b64decode('').decode())"

      - name: Run safe tests + coverage
        shell: bash
        run: |
          pytest tests/test_sanitizer.py tests/test_rate_limit.py -q --tb=short \
            --cov=utils/sanitizer --cov=utils \
            --cov-report=xml --cov-report=html --cov-report=term-missing

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}
          path: |
            htmlcov/
            coverage.xml
          retention-days: 14

      - name: Final status
        run: echo "CI success on ${{ matrix.os }}"
