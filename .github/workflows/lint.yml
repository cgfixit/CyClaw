# Fast lint gate for pull requests and claude/* feature branches.
# Sequence: Ruff (fast, modern rules exactly matching pyproject.toml) → wemake-python-styleguide (strict WPS + flake8 plugins).
# No project deps (torch, ChromaDB, LangGraph, etc.) — full CI (tests + coverage) runs separately.
#
# Ruff first for quick feedback on your tuned select (E,F,I,B,C4,UP,S); it runs
# repo-wide because the whole tree is expected to already be clean under that
# select set (CLAUDE.md, §5 Conventions).
#
# wemake adds the official complementary strict/opinionated WPS layer, but the
# existing tree was never brought WPS-clean, so it is scoped to only the
# .py files actually changed on this branch vs its merge-base with the PR's
# target branch (main/cc) — otherwise every PR fails on pre-existing findings
# in files it never touched.
#
# wemake/flake8 is run directly via pip + `flake8 <files...>` rather than the
# wemake-services/wemake-python-styleguide Docker action: that action's
# `path` input is documented as accepting a "space-separated list of paths",
# but it forwards the input as a single Docker `args` entry and the
# entrypoint passes it to flake8 as one literal argument without splitting
# it — so any PR touching more than one .py file fails with a literal
# "FileNotFoundError: 'file_a.py file_b.py'" instead of linting each file.
# Confirmed against wemake-python-styleguide 1.6.2 / flake8 7.3.0 (the same
# versions pinned below). Running flake8 ourselves loses the action's
# reviewdog inline-PR-comment reporting, but keeps the actual gate (flake8's
# exit code) working correctly for any number of changed files.
#
# Rule scope and UP backlog notes preserved from prior ruff-up-alignment work.

name: Lint

on:
  push:
    branches:
      - 'claude/**'
  pull_request:
    branches: [main, cc]

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (Ruff + WPS)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          fetch-depth: 0   # full history needed for the merge-base diff below
          persist-credentials: false

      - name: Setup Python 3.12
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: '3.12'
          cache: 'pip'
          # ruff/flake8/wemake versions are pinned directly in this workflow's
          # run: steps (no requirements.txt entry), so key the cache on the
          # workflow file itself -- a version bump here still busts the cache.
          cache-dependency-path: .github/workflows/lint.yml

      - name: Install ruff
        run: pip install -c constraints.txt ruff

      - name: Ruff check (fast modern gate)
        run: ruff check --select E,F,I,B,C4,UP,S .

      - name: Determine changed Python files
        id: changed
        env:
          # Routed through env instead of interpolated directly into the run
          # script: a template expanded straight into shell text is evaluated
          # before bash ever sees it as a variable, so a base-ref value
          # containing shell metacharacters would execute as code rather than
          # just being treated as a string once it reaches "$BASE_REF" (zizmor
          # template-injection, high confidence).
          BASE_REF_INPUT: ${{ github.event.pull_request.base.ref }}
        run: |
          BASE_REF="${BASE_REF_INPUT:-main}"
          git fetch origin "$BASE_REF"
          BASE_SHA=$(git merge-base "origin/$BASE_REF" HEAD)
          # xargs (no command) joins lines with single spaces and trims any
          # leading/trailing whitespace — `tr '\n' ' '` alone leaves a
          # trailing space after the last filename, which the wemake action
          # then treats as part of the (single) path argument verbatim,
          # producing a literal "FileNotFoundError: 'name.py '" instead of
          # linting the file.
          FILES=$(git diff --name-only --diff-filter=ACMR "$BASE_SHA" HEAD -- '*.py' | xargs)
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          if [ -n "$FILES" ]; then
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install wemake-python-styleguide (strict WPS + flake8 plugins)
        if: steps.changed.outputs.has_files == 'true'
        run: pip install flake8==7.3.0 wemake-python-styleguide==1.6.2

      - name: wemake-python-styleguide (strict WPS + flake8 plugins)
        # Scoped to this branch's changed .py files (see the step above) so the
        # job only fails on findings in code this PR actually touches — the
        # existing tree was never brought WPS-clean. setup.cfg (repo root)
        # sets max-line-length=120 to match the project's Ruff standard.
        if: steps.changed.outputs.has_files == 'true'
        env:
          # Routed through env rather than interpolated into the run script —
          # the file list originates from filenames a PR branch can name
          # arbitrarily (git diff output), so template-expanding it directly
          # into shell text would let a maliciously-named file execute as code
          # instead of just being read as a string argument (zizmor
          # template-injection).
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: |
          # CHANGED_FILES is a space-separated list that must word-split into
          # one flake8 argument per file (see the xargs comment on the step
          # above for why a trailing-space edge case ruled out the alternatives).
          # shellcheck disable=SC2086
          flake8 $CHANGED_FILES
