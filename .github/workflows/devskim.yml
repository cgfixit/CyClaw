# .github/workflows/devskim.yml
#
# Static security scan with Microsoft DevSkim
# Tailored for CGFixIT/CyClaw (Python project with Poetry)

name: "DevSkim – CyClaw"

on:
  push:
    branches: [ "main", "dev", "release/**" ]
  pull_request:
    branches: [ "main", "dev", "release/**" ]
  schedule:
    # Every Sunday at 03:11 UTC
    - cron: "11 3 * * 0"

permissions:
  contents: read          # checkout
  security-events: write  # upload SARIF

# Cancel superseded in-progress runs on the same branch to save CI minutes;
# pushes to main are exempt so main keeps a complete scan history.
concurrency:
  group: devskim-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  devskim:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3  # v6

      # Optional: set up Python & install deps so DevSkim understands imports
      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c  # v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            constraints.txt
            pyproject.toml

      - name: Install project dependencies (Poetry or requirements.txt)
        run: |
          python -m pip install --upgrade pip
          # CyClaw quirk (CLAUDE.md § Dependency Notes): install CPU-only torch
          # BEFORE requirements.txt, otherwise Linux pulls the multi-GB CUDA
          # wheel. Mirrors ci.yml so DevSkim's import-resolution env matches CI.
          pip install torch==2.6.0+cpu --index-url https://download.pytorch.org/whl/cpu
          if [ -f poetry.lock ]; then
            pip install poetry
            poetry install --no-root --no-interaction --no-ansi
          elif [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "No dependency file found – continuing without install."
          fi

      # Run DevSkim
      - name: Run DevSkim scanner
        id: devskim
        uses: microsoft/DevSkim-Action@v1
        with:
          # Scan the whole workspace. The action's default `directory-to-scan` is
          # GITHUB_WORKSPACE, so it is omitted here.
          #
          # The previous config used `directory:`, `output:`, `severity:`, and
          # `ignore-files:` — none of which are valid DevSkim-Action@v1 inputs.
          # The action silently ignored them (see the "Unexpected input(s)"
          # warning in earlier run logs) and fell back to scanning the whole repo
          # with defaults anyway. These are the correct input names; the effective
          # behavior (whole-repo scan, inline `# DevSkim: ignore <rule>`
          # suppressions honored) is unchanged.
          #
          # NOTE: DevSkim-Action@v1 has no `severity` input — severity gating was
          # never actually applied. The job's pass/fail is driven by the SARIF
          # upload + code-scanning alert creation below, which is the intended
          # security behavior.
          output-filename: devskim-results.sarif
          ignore-globs: "**/.git/**,**/bin/**,**/*.md,**/*.json"

      # Upload SARIF to GitHub Security tab
      - name: Publish findings to Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: devskim-results.sarif

      # Also keep the SARIF as a downloadable run artefact (optional)
      - name: Save SARIF artefact
        uses: actions/upload-artifact@v7
        with:
          name: devskim-results
          path: devskim-results.sarif
