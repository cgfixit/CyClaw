# ==============================================================================
# CyClaw • Codacy Security & Quality Scan
#
# Purpose: Structural CI gate for Python + security invariants (aligns with
#          the 5 topology-enforced invariants in the agent). Fast feedback on
#          sanitizer.py, graph.py, retrieval, gate logic, etc. without noise.
#
# Hardening applied:
# - Explicit permissions (least privilege)
# - Concurrency + timeout (cost + reliability)
# - Python-focused tool selection via extra-args + .codacy.yml excludes
# - Separate SARIF upload with gh-code-scanning-compat
# - High max-allowed-issues (delegate failure to branch protection)
# - Resolvable action references (no fake SHAs)
# ==============================================================================

name: CyClaw • Codacy Security & Quality Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # Manual trigger for audits / pre-release

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  codacy:
    name: Codacy Analysis (Python + Security invariants layer)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Codacy Analysis CLI (Python + invariants hardened)
        uses: codacy/codacy-analysis-cli-action@master
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          directory: ${{ github.workspace }}
          verbose: true
          output: results.sarif
          format: sarif
          gh-code-scanning-compat: true
          max-allowed-issues: 2147483647
          upload: false
          # Python + security focused tools (tune as needed)
          extra-args: "--tools bandit,pylint,prospector"

      - name: Upload SARIF to GitHub Advanced Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
          category: codacy-invariants

      - name: Archive raw results (debug false positives on sanitizer/graph)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codacy-sarif-debug
          path: results.sarif
          retention-days: 7
