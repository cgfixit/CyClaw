# ==============================================================================
# CyClaw • Structural Security Gate (Cyclaw-Advisor v1.4.0 aligned)
# Purpose: Enforce invariants with high signal, low noise, fast runtime.
# Capital discipline: 8 min timeout max. No more Docker bloat tax.
# ==============================================================================

name: CyClaw • Security & Quality Gate

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Install tools
        run: pip install bandit ruff

      - name: Ruff Lint (fast, structural)
        run: ruff check . --select I,E,F,B --output-format=github || true

      - name: Bandit Security Scan
        run: bandit -r src/ . --severity-level high -f sarif -o results.sarif || true

      - name: Upload to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
          category: cy-claw-invariants

      - name: Note on Codacy
        run: echo "Codacy full run disabled for ROI. Add CODACY_PROJECT_TOKEN and enable in dashboard only Python tools if desired."