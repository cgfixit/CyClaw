name: CyClaw • Codacy Security & Quality Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '37 14 * * 2'  # Staggered
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  codacy:
    name: Codacy Analysis (Python + Security invariants layer)
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Codacy Analysis CLI
        uses: codacy/codacy-analysis-cli-action@1
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          # Absolute path + explicit to defeat Docker volume mount bugs
          directory: ${{ github.workspace }}
          verbose: true
          output: results.sarif
          gh-code-scanning-compat: true
          max-allowed-issues: 2147483647
          upload: false

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: codacy-invariants

      - name: Archive artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codacy-debug
          path: results.sarif
          retention-days: 7
