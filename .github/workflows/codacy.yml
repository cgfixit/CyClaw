name: CyClaw • Codacy Security & Quality Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '37 14 * * 2'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  codacy:
    name: Codacy Analysis (Python + Security invariants layer)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Codacy Analysis CLI - Hardened
        uses: codacy/codacy-analysis-cli-action@1
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          # Removed directory entirely - this was the Docker volume culprit
          # Let the action use default GITHUB_WORKSPACE behavior
          verbose: true
          gh-code-scanning-compat: true
          max-allowed-issues: 999999
          upload: false
          # Force Python focus + common security tools
          # extra-args: "--languages python --tools bandit,semgrep,safety,pylint"

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: codacy

      - name: Archive results for debug
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codacy-results
          path: |
            results.sarif
            codacy.log
          retention-days: 5
