# ==============================================================================
# CyClaw • Codacy Security & Quality Scan
#
# Purpose: Structural CI gate for Python + security invariants.
#          Uses Codacy dashboard + .codacy.yml to control tools (extra-args
#          is not a supported input on this action).
# ==============================================================================

name: CyClaw • Codacy Security & Quality Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  codacy:
    name: Codacy Analysis (Python + Security invariants layer)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Codacy Analysis CLI
        uses: codacy/codacy-analysis-cli-action@master
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          directory: ${{ github.workspace }}
          verbose: true
          output: results.sarif
          format: sarif
          gh-code-scanning-compat: true
          max-allowed-issues: 2147483647
          upload: false

      - name: Upload SARIF to GitHub Advanced Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
          category: codacy-invariants

      - name: Archive raw SARIF (for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codacy-sarif-debug
          path: results.sarif
          retention-days: 7
