# [same header but updated]
name: CyClaw • Codacy Security & Quality Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '37 14 * * 2'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  codacy:
    name: Codacy Analysis (Python + Security invariants layer)
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Run Codacy Analysis CLI (Python-focused)
        uses: codacy/codacy-analysis-cli-action@master
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          verbose: true
          output: results.sarif
          format: sarif
          gh-code-scanning-compat: true
          max-allowed-issues: 2147483647
          upload: false
          tools: bandit,safety,pylintpython3,prospector,flake8  # Critical Python tools only. No Trivy/ESLint/PMD/markdown noise
          # extra-args: '--config .codacy.yml'  

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: codacy-python-security  # Unique category to avoid multi-run conflict

      - name: Archive results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codacy-debug
          path: results.sarif
          retention-days: 7