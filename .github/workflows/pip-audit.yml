name: pip-audit (Python dependency CVE scan + Install Verification Gate)

on:
  schedule:
    - cron: '0 6 * * *'
  push:
    paths:
      - 'requirements.txt'
      - 'constraints.txt'
      - '.github/workflows/pip-audit.yml'
  pull_request:
    paths:
      - 'requirements.txt'
      - 'constraints.txt'
      - '.github/workflows/pip-audit.yml'
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded in-progress runs on the same branch to save CI minutes;
# pushes to main are exempt so main keeps a complete scan history.
concurrency:
  group: pip-audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  verify-install:
    name: verify-install (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.12'

      - name: Upgrade pip (CVE mitigation)
        shell: bash
        run: python -m pip install --upgrade "pip>=26.1.2"

      - name: Install CPU-only torch first (offline-first, avoids CUDA wheel)
        shell: bash
        # torch is intentionally NOT pinned in requirements.txt — see its header:
        # a bare resolve pulls the ~2.5 GB CUDA build from PyPI on Linux. Install
        # the lean CPU wheel from the PyTorch index FIRST (matching ci.yml and the
        # documented CVE-2025-32434 >=2.6.0 floor) so the requirements resolve
        # below reuses it instead of dragging in the heavy CUDA build.
        run: |
          pip install torch==2.6.0+cpu --index-url https://download.pytorch.org/whl/cpu

      - name: Install with constraints (reproducible gate)
        shell: bash
        run: |
          pip install -r requirements.txt -c constraints.txt

      - name: Minimal hermetic prep + smoke import check
        shell: bash
        run: |
          mkdir -p data/personality index logs
          echo '# Soul' > data/personality/soul.md
          echo 'GROK_API_KEY=dummy' >> $GITHUB_ENV
          python -c "import chromadb, langgraph, fastapi; print('Core imports OK on ${{ matrix.os }}')"
          # Optional: python -m tests.ci_rag_smoke if full smoke desired in verify

  scan:
    needs: verify-install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.12'

      - name: Install pip-audit (CI scanner only)
        run: pip install pip-audit

      - name: Run pip-audit (ignore only mitigated chromadb CVE)
        run: |
          pip-audit -r requirements.txt --ignore-vuln CVE-2026-45829
        # CVE-2026-45829 (Critical pre-auth RCE) — risk accepted under v1.4.0 invariants.
        # Actual controls:
        #   - chromadb.PersistentClient (local embedded mode, path from config.yaml["indexing"]["chroma_path"])
        #   - No HttpClient / no network-exposed /api/v2 server surface
        #   - Pre-computed embeddings via sentence-transformers (no dynamic embedding functions or trust_remote_code paths)
        #   - Offline-first design + full telemetry kill switch in gate.py
        #   - Reproducible install gate (verify-install matrix on ubuntu/windows + Python 3.12)
        # Cross-ref: cyclaw-advisor §K / §M, hybrid_search.py:55, indexer.py:58, gate.py:TELEMETRY_KILL
        # Track upstream for patched 1.5.x release; re-evaluate on bump.
