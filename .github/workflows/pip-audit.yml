name: pip-audit (Python dependency CVE scan + Install Verification Gate)

on:
  schedule:
    - cron: '0 6 * * *'
  push:
    paths:
      - 'requirements.txt'
      - 'constraints.txt'
      - '.github/workflows/pip-audit.yml'
  pull_request:
    paths:
      - 'requirements.txt'
      - 'constraints.txt'
      - '.github/workflows/pip-audit.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-install:
    name: verify-install (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'

      - name: Upgrade pip (CVE mitigation)
        shell: bash
        run: python -m pip install --upgrade "pip>=26.1.2"

      - name: Install with constraints (reproducible gate)
        shell: bash
        run: |
          pip install -r requirements.txt -c constraints.txt

      - name: Minimal hermetic prep + smoke import check
        shell: bash
        run: |
          mkdir -p data/personality index logs
          echo '# Soul' > data/personality/soul.md
          echo 'GROK_API_KEY=dummy' >> $GITHUB_ENV
          python -c "import chromadb, langgraph, fastapi; print('Core imports OK on ${{ matrix.os }}')"
          # Optional: python -m tests.ci_rag_smoke if full smoke desired in verify

  scan:
    needs: verify-install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'

      - name: Install pip-audit (CI scanner only)
        run: pip install pip-audit

      - name: Run pip-audit (ignore only mitigated chromadb CVE)
        run: |
          pip-audit -r requirements.txt --ignore-vuln CVE-2026-45829
        # CVE-2026-45829 mitigation (structural per v1.4.0 invariants):
        # - Binds to 127.0.0.1 in gate.py
        # - trust_remote_code=False enforced in retrieval/embeddings.py, retrieval/indexer.py, mcp_hybrid_server.py
        # - Offline-first design (no unauth external surface)
        # Cross-ref: cyclaw-advisor PDF §K Deployment, §M Security Invariants, and hardened CI gate.
        # Real risk near-zero under the 5 invariants. Track upstream for patch.
