name: pip-audit (Python dependency CVE scan + Install Verification Gate)

on:
  schedule:
    - cron: '0 6 * * *'
  push:
    paths:
      - 'requirements.txt'
      - 'constraints.txt'
      - '.github/workflows/pip-audit.yml'
  pull_request:
    paths:
      - 'requirements.txt'
      - 'constraints.txt'
      - '.github/workflows/pip-audit.yml'
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded in-progress runs on the same branch to save CI minutes;
# pushes to main are exempt so main keeps a complete scan history.
concurrency:
  group: pip-audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  verify-install:
    name: verify-install (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.12'
          cache: 'pip'
          # Matches ci.yml's convention. This job's own triggers already fire on
          # every requirements.txt/constraints.txt change, so the pip cache still
          # busts every run that matters — but restores unrelated-transitive
          # wheels from a previous run instead of a cold cache.
          cache-dependency-path: |
            requirements.txt
            constraints.txt
            pyproject.toml

      - name: Upgrade pip (CVE mitigation)
        shell: bash
        # Exact pin per ci.yml header policy (==26.1.2, not floating >=) — keeps
        # CI reproducible instead of silently picking up whatever pip ships next.
        run: python -m pip install --upgrade "pip==26.1.2"

      - name: Cache torch CPU wheel
        # Mirrors ci.yml's dedicated torch cache: torch (~2GB) is pinned
        # infrequently, so keying its wheel separately means this job's own
        # requirements.txt/constraints.txt triggers don't force a re-download of
        # the heaviest dependency on every run.
        id: torch-wheel-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: .torch-wheels
          key: torch-cpu-2.13.0-${{ runner.os }}-py312
          restore-keys: |
            torch-cpu-2.13.0-${{ runner.os }}-

      - name: Download torch wheel (cache miss only)
        if: steps.torch-wheel-cache.outputs.cache-hit != 'true'
        shell: bash
        # torch is intentionally NOT pinned in requirements.txt — see its header:
        # a bare resolve pulls the ~2.5 GB CUDA build from PyPI on Linux. Fetch
        # the lean CPU wheel from the PyTorch index (matching ci.yml and the
        # documented CVE-2025-32434 >=2.6.0 floor); --no-deps avoids pulling the
        # default CUDA build.
        run: |
          pip download "torch==2.13.0+cpu" \
            --index-url https://download.pytorch.org/whl/cpu \
            --no-deps -d .torch-wheels

      - name: Install with constraints (reproducible gate)
        shell: bash
        run: |
          pip install --no-index --no-deps --find-links .torch-wheels "torch==2.13.0+cpu"
          pip install -r requirements.txt -c constraints.txt

      - name: Minimal hermetic prep + smoke import check
        shell: bash
        run: |
          mkdir -p data/personality index logs
          echo '# Soul' > data/personality/soul.md
          echo 'GROK_API_KEY=dummy' >> "$GITHUB_ENV"
          python -c "import chromadb, langgraph, fastapi; print('Core imports OK on ${{ matrix.os }}')"
          # Optional: python -m tests.ci_rag_smoke if full smoke desired in verify

  scan:
    needs: verify-install
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.12'

      - name: Install pip-audit (CI scanner only)
        run: pip install pip-audit

      - name: Run pip-audit (ignore only mitigated chromadb + nltk CVEs)
        run: |
          pip-audit -r requirements.txt --ignore-vuln CVE-2026-45829 --ignore-vuln PYSEC-2026-597 --ignore-vuln PYSEC-2026-3447
        # CVE-2026-45829 (Critical pre-auth RCE) — risk accepted under v1.4.0 invariants.
        # Actual controls:
        #   - chromadb.PersistentClient (local embedded mode, path from config.yaml["indexing"]["chroma_path"])
        #   - No HttpClient / no network-exposed /api/v2 server surface
        #   - Pre-computed embeddings via sentence-transformers (no dynamic embedding functions or trust_remote_code paths)
        #   - Offline-first design + full telemetry kill switch in gate.py
        #   - Reproducible install gate (verify-install matrix on ubuntu/windows + Python 3.12)
        # Cross-ref: cyclaw-advisor §K / §M, hybrid_search.py:55, indexer.py:58, gate.py:TELEMETRY_KILL
        # Track upstream for patched 1.5.x release; re-evaluate on bump.
        #
        # PYSEC-2026-597 (nltk) — risk accepted, 2026-07. nltk bumped 3.9.4->3.10.0
        # on main (dependabot) 2026-07-17; not confirmed here whether 3.10.0 itself
        # carries a fix (osv.dev is unreachable from this sandbox to check) -- the
        # ignore is kept regardless since it's still fully mitigated below.
        # CyClaw's only nltk usage is
        # `from nltk.stem import PorterStemmer` (retrieval/stemmer.py); it never
        # calls nltk.download() or nltk.data.load() -- the known nltk vulnerability
        # classes (downloader zip-slip RCE, punkt/corpus-reader path traversal) all
        # live in code this repo never executes. stemmer.py's own header comment
        # already documents this: "the NLTK URL-encoded path-traversal CVE (punkt
        # tokenizer) is not reachable." Re-evaluate when a patched release ships.
        #
        # PYSEC-2026-3447 (setuptools, fixed in 83.0.0) — scanner-resolution
        # artifact, added 2026-07-17 after 3 consecutive daily failures on main
        # (first red: 2026-07-15). setuptools is not pinned or shipped by any
        # CyClaw manifest (requirements.txt / constraints.txt / pyproject.toml);
        # it enters this audit's dependency closure only because torch's own
        # metadata declares `setuptools>=77.0.3` as a runtime dependency, and
        # the runner resolved 81.0.0 even though the patched 83.0.0 is live on
        # PyPI (verified 2026-07-17, not yanked, requires-python >=3.10 —
        # compatible with this job's 3.12). A real install on a current
        # environment resolves the patched version. Remove this ignore once the
        # runner's resolution picks setuptools>=83.0.0; if the audit then still
        # flags setuptools, treat that as a real finding, not noise.
