name: "Copilot Setup Steps"

# Run when the file changes (validates the setup steps work), and allow manual runs.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # Must be named exactly `copilot-setup-steps` to be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            constraints.txt
            pyproject.toml

      - name: Upgrade pip
        run: python -m pip install --upgrade "pip>=26.1.2"

      - name: Install torch CPU (must precede requirements.txt to avoid CUDA wheel)
        run: pip install torch==2.6.0+cpu --index-url https://download.pytorch.org/whl/cpu

      - name: Install CyClaw dependencies + test tools
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Prepare runtime directories
        run: |
          mkdir -p data/personality index logs
          printf '# Soul\n' > data/personality/soul.md

