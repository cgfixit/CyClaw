name: "Copilot Setup Steps"

# Run when the file changes (validates the setup steps work), and allow manual runs.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # Must be named exactly `copilot-setup-steps` to be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            constraints.txt
            pyproject.toml

      - name: Upgrade pip
        run: python -m pip install --upgrade "pip>=26.1.2"

      - name: Install torch CPU (must precede requirements.txt to avoid CUDA wheel)
        run: pip install torch==2.12.1+cpu --index-url https://download.pytorch.org/whl/cpu

      - name: Install CyClaw dependencies + test tools
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Prepare runtime directories
        run: |
          mkdir -p data/personality index logs
          printf '# Soul\n' > data/personality/soul.md

