name: "Copilot Setup Steps"

# Run when the file changes (validates the setup steps work), and allow manual runs.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

# Cancel superseded in-progress runs on the same ref, matching every other
# workflow in this repo (e.g. pip-audit.yml); pushes to main are exempt.
concurrency:
  group: copilot-setup-steps-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # Must be named exactly `copilot-setup-steps` to be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false

      - name: Setup Python 3.12
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            constraints.txt
            pyproject.toml

      - name: Upgrade pip
        # Exact pin per ci.yml header policy (==26.1.2, not floating >=).
        run: python -m pip install --upgrade "pip==26.1.2"

      - name: Install torch CPU (must precede requirements.txt to avoid CUDA wheel)
        run: pip install torch==2.13.0+cpu --index-url https://download.pytorch.org/whl/cpu

      - name: Install CyClaw dependencies + test tools
        run: pip install -r requirements.txt -c constraints.txt pytest pytest-cov

      - name: Prepare runtime directories
        run: |
          mkdir -p data/personality index logs
          printf '# Soul\n' > data/personality/soul.md

