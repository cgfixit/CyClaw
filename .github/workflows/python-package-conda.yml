name: CyClaw Conda CI 

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write  # for CodeQL

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]  # match sandbox 3.12 + modern invariants

    steps:
    - name: Checkout
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Setup Miniconda + mamba (fast solver)
      uses: conda-incubator/setup-miniconda@v4
      with:
        miniforge-version: latest
        python-version: ${{ matrix.python-version }}
        channels: conda-forge
        channel-priority: strict
        activate-environment: cyclaw
        environment-file: .github/workflows/environment.yml
        auto-activate-base: false
        use-mamba: true

    - name: Cache conda environment
      uses: actions/cache@v6
      with:
        path: |
          /home/runner/miniconda3/envs/cyclaw
          /home/runner/miniconda3/pkgs
        key: conda-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('.github/workflows/environment.yml', 'pyproject.toml', '**/requirements*.txt') }}
        restore-keys: |
          conda-${{ runner.os }}-${{ matrix.python-version }}-

    - name: Install CyClaw in editable mode + test extras
      shell: bash -l {0}
      run: |
        python -m pip install -e ".[test,dev]" --no-deps || echo "No [test,dev] extras yet — add to pyproject.toml"
        # If heavy deps live in environment.yml, they are already resolved by mamba

    - name: Prepare hermetic test env
      shell: bash -l {0}
      run: |
        mkdir -p data/personality index logs
        echo '# Soul' > data/personality/soul.md
        echo 'GROK_API_KEY=dummy' >> $GITHUB_ENV

    - name: Pytest — unit + integration + safe smoke (RAG/policy focused)
      shell: bash -l {0}
      run: |
        pytest tests/ \
          -v \
          --cov=gate \
          --cov=graph \
          --cov=mcp_hybrid_server \
          --cov=metrics \
          --cov=llm \
          --cov=retrieval \
          --cov=utils \
          --cov=sync \
          --cov=agentic \
          --cov=guardrails \
          --cov-report=xml \
          --cov-report=term-missing \
          -m "not slow and not agentic" \
          --tb=short
        # agentic/ and heavy fsconnect/sqlconnect paths remain human-reason gated (off-by-default in CI)

    - name: Run verify harness / smoke (if present)
      shell: bash -l {0}
      run: |
        if [ -x ./verify.sh ]; then
          echo "Running project verify.sh harness..."
          ./verify.sh
        fi
        if [ -f .claude/skills/sandbox-runtime-verification/verify.sh ]; then
          echo "Running sandbox verification harness..."
          bash .claude/skills/sandbox-runtime-verification/verify.sh
        fi

    - name: Initialize CodeQL (Python security)
      uses: github/codeql-action/init@v4
      with:
        languages: python

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
