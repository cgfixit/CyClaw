name: "Semgrep SAST"

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "docs/**"
      - ".claude/**"
  pull_request:
    branches: ["main"]
  schedule:
    - cron: '20 3 * * 3'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: semgrep-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  semgrep:
    name: Semgrep OSS Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: '3.12'
          cache: 'pip'
          # semgrep has no pin in requirements.txt (installed ad hoc below), so
          # key the cache on the workflow file itself.
          cache-dependency-path: .github/workflows/semgrep.yml

      - name: Install and run Semgrep
        run: |
          pip install semgrep
          # Zizmor owns the dangerous-trigger control and supports the reviewed,
          # scoped exception in pr-review.yml. Semgrep SARIF uploads source-
          # suppressed findings, so exclude only the duplicate registry rule.
          semgrep scan \
            --config p/python \
            --config p/owasp-top-ten \
            --exclude-rule yaml.github-actions.security.pull-request-target-code-checkout.pull-request-target-code-checkout \
            --sarif -o semgrep.sarif .

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81  # v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep
