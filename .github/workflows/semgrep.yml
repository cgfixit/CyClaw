name: "Semgrep SAST"

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "docs/**"
      - ".claude/**"
  pull_request:
    branches: ["main"]
  schedule:
    - cron: '20 3 * * 3'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: semgrep-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  semgrep:
    name: Semgrep OSS Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.12'
          cache: 'pip'
          # semgrep has no pin in requirements.txt (installed ad hoc below), so
          # key the cache on the workflow file itself.
          cache-dependency-path: .github/workflows/semgrep.yml

      - name: Install and run Semgrep
        run: |
          pip install semgrep
          # Zizmor owns the dangerous-trigger control and supports the reviewed,
          # scoped exception in pr-review.yml. Semgrep SARIF uploads source-
          # suppressed findings, so exclude only the duplicate registry rule.
          semgrep scan \
            --config p/python \
            --config p/owasp-top-ten \
            --exclude-rule yaml.github-actions.security.pull-request-target-code-checkout.pull-request-target-code-checkout \
            --sarif -o semgrep.sarif .

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep
