# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

# .github/dependabot.yml
# Dependabot configuration for CyClaw
#
# Ecosystems:
#   1. npm  – updates package.json / package-lock.json in repo root
#   2. pip  – updates requirements*.txt / pyproject.toml in repo root
#   3. GitHub Actions – bumps versions in .github/workflows/*
#
# Schedule: weekly on Thursday (≈03:00 UTC by default)
# Each ecosystem uses a single catch-all group so related bumps arrive as ONE
# consolidated PR per ecosystem instead of one PR per dependency.

version: 2

updates:
  # 1) JavaScript / TypeScript (npm)
  - package-ecosystem: "npm"
    directory: "/"                 # package.json lives in repo root
    schedule:
      interval: "weekly"
      day: "thursday"
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - npm
    groups:
      npm-all:
        patterns:
          - "*"
    ignore:
      # package.json is unused scaffolding (no JS source, no lockfile). Ignore
      # these so Dependabot stops re-proposing bumps for dependencies nothing
      # actually runs. Remove an entry here if/when the JS app becomes real.
      - dependency-name: "express"
      - dependency-name: "eslint"

  # 2) Python (pip)
  - package-ecosystem: "pip"
    directory: "/"                 # requirements*.txt / pyproject.toml in repo root
    schedule:
      interval: "weekly"
      day: "thursday"
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - python
    groups:
      pip-all:
        patterns:
          - "*"
    ignore:
      # numpy is intentionally pinned to 1.x: numpy 2.x removes np.float_, which
      # breaks chromadb's onnxruntime dependency (see requirements.txt:35).
      - dependency-name: "numpy"
        versions: [">=2.0.0"]

  # 3) GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"                 # Dependabot scans .github/workflows/**
    schedule:
      interval: "weekly"
      day: "thursday"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
      - ci
    groups:
      actions-all:
        patterns:
          - "*"
