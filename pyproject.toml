[project]
name = "cyclaw"
version = "1.4.0"
description = "Offline-first, RAG-enforced, soul-governed personal AI assistant. Secure local CyClaw with LangGraph invariants."
readme = "README.md"
requires-python = ">=3.11,<3.13"
license = {text = "MIT"}
authors = [{name = "Chris Grady (CGFixIT)", email = "chris@cgfixit.com"}]
keywords = ["rag", "ai-agent", "offline", "security", "fastapi", "langgraph"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
    "Topic :: Security",
]

dependencies = [
    "fastapi==0.137.2",
    "uvicorn[standard]==0.49.0",
    "pydantic==2.13.4",
    "pyyaml==6.0.3",
    "httpx==0.28.1",
    "langgraph==1.2.5",
    "langchain-core==1.4.7",
    "chromadb==1.5.9",
    "sentence-transformers==5.6.0",
    "rank-bm25==0.2.2",
    "numpy==1.26.4",
    "nltk==3.9.4",
]

[project.optional-dependencies]
test = [
    "pytest==9.1.0",
    "pytest-asyncio==1.4.0",
]
dev = [
    "ruff",
    "mypy",
    "bandit",
    "uv",
]
torch-cpu = ["torch==2.4.1+cpu"]

[project.scripts]
cyclaw-server = "gate:main"
cyclaw-index = "retrieval.indexer:main"
cyclaw-mcp = "mcp_hybrid_server:main"
cyclaw-metrics = "metrics:main"

[project.urls]
Homepage = "https://github.com/CGFixIT/CyClaw"
Repository = "https://github.com/CGFixIT/CyClaw"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.envs.default]
dependencies = ["pytest", "ruff"]

[tool.uv]
index-strategy = "unsafe-best-match"

[[tool.uv.sources]]
name = "torch"
url = "https://download.pytorch.org/whl/cpu"

# Tool configs as per analysis
[tool.ruff]
target-version = "py312"
select = ["E", "F", "I", "B", "C4", "UP", "S"]  # S for security
ignore = ["E501"]

[tool.pytest.ini_options]
minversion = "9.0"
addopts = "-ra -q --cov=."
testpaths = ["tests"]

[tool.mypy]
python_version = "3.12"
strict = true

[[tool.uv.pip]]
extra-index-url = ["https://download.pytorch.org/whl/cpu"]

