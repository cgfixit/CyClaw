[project]
name = "cyclaw"
version = "1.4.0"
description = "Offline-first, RAG-enforced, soul-governed personal AI assistant. Secure local CyClaw with LangGraph invariants and zero telemetry."
readme = "README.md"
requires-python = ">=3.12"
license = {text = "MIT"}
authors = [{name = "Chris Grady (CGFixIT)", email = "chris@cgfixit.com"}]
keywords = ["rag", "ai-agent", "offline", "security", "fastapi", "langgraph", "chromadb", "soul-governance"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
    "Topic :: Security",
    "Framework :: FastAPI",
    "Operating System :: OS Independent",
    "Typing :: Typed",
    "Environment :: Console",
]

dependencies = [
    "fastapi==0.137.2",
    "uvicorn[standard]==0.49.0",
    "pydantic==2.13.4",
    "pyyaml==6.0.3",
    "httpx==0.28.1",
    "langgraph==1.2.5",
    "langchain-core==1.4.7",
    "chromadb==1.5.9",
    "sentence-transformers==5.6.0",
    "rank-bm25==0.2.2",
    "numpy==1.26.4",
    "nltk==3.9.4",
]

[project.optional-dependencies]
test = [
    "pytest==9.1.0",
    "pytest-asyncio==1.4.0",
]
dev = [
    "ruff",
    "mypy",
    "bandit",
]
torch-cpu = ["torch==2.4.1+cpu"]
full = ["cyclaw[torch-cpu,dev,test]"]

[project.scripts]
cyclaw-server = "gate:main"
cyclaw-index = "retrieval.indexer:main"
cyclaw-mcp = "mcp_hybrid_server:main"
cyclaw-metrics = "metrics:main"

[project.urls]
Homepage = "https://github.com/CGFixIT/CyClaw"
Repository = "https://github.com/CGFixIT/CyClaw"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv]
index-strategy = "unsafe-best-match"

[[tool.uv.sources]]
name = "torch"
url = "https://download.pytorch.org/whl/cpu"

# Tool configs — consolidated, security-first, aligned with CI and project invariants
[tool.ruff]
target-version = "py312"
line-length = 120
select = ["E", "F", "I", "B", "C4", "UP", "S"]  # S = security (flake8-bandit rules)
ignore = ["E501"]

[tool.pytest.ini_options]
minversion = "9.0"
addopts = "-ra -q --cov=gate --cov=graph --cov=llm --cov=retrieval --cov=utils --cov=mcp_hybrid_server --cov=metrics"
testpaths = ["tests"]

[tool.mypy]
python_version = "3.12"
strict = true

[tool.bandit]
exclude_dirs = ["tests"]
skips = ["B101"]  # intentional asserts in security tests and validation

[tool.coverage.run]
source = ["gate", "graph", "llm", "retrieval", "utils", "mcp_hybrid_server", "metrics"]
omit = ["tests/*", "*/test_*", "*/__pycache__/*"]

[tool.coverage.report]
fail_under = 65
show_missing = true
