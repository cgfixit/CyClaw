[project]
name = "cyclaw"
version = "1.4.1"
description = "Offline-first, RAG-enforced, soul-governed personal AI assistant. Secure local CyClaw with LangGraph invariants, zero telemetry, and production-hardened tooling."
readme = "README.md"
requires-python = ">=3.12"
license = {text = "MIT"}
authors = [{name = "Chris Grady (@cgfixit)", email = "chris@cgfixit.com"}]
keywords = ["rag", "langgraph", "offline-ai", "secure-agent", "fastapi", "chromadb", "mcp", "psyclaw"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Security",
    "Framework :: FastAPI",
    "Environment :: Console",
    "Typing :: Typed",
]

dependencies = [
    "fastapi>=0.115.0,<0.138",
    "uvicorn[standard]>=0.30.0",
    "pydantic>=2.9.0",
    "pyyaml>=6.0.1",
    "httpx>=0.27.0",
    "langgraph>=1.2.0,<1.3",
    "langchain-core>=0.3.0",
    "chromadb>=1.5.0",
    "sentence-transformers>=3.0.0",
    "rank-bm25>=0.2.2",
    "numpy>=1.26.0,<2",
    "nltk>=3.9.0",
]

[project.optional-dependencies]
test = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
    "pytest-cov",
]
dev = [
    "ruff>=0.9.0",
    "mypy>=1.13.0",
    "bandit>=1.7.0",
    "pre-commit",
]
torch-cpu = ["torch==2.5.0+cpu ; sys_platform != 'win32'"]  # 2026 cpu wheels

[dependency-groups]
dev = ["ruff", "mypy", "bandit", "pytest"]  # uv native

[project.scripts]
cyclaw = "gate:main"
cyclaw-server = "gate:main"
cyclaw-index = "retrieval.indexer:main"
cyclaw-mcp = "mcp_hybrid_server:main"
cyclaw-metrics = "metrics:main"

[project.urls]
Homepage = "https://github.com/CGFixIT/CyClaw"
"Bug Tracker" = "https://github.com/CGFixIT/CyClaw/issues"

[build-system]
requires = ["hatchling>=1.24.0"]
build-backend = "hatchling.build"

[tool.uv]
index-strategy = "unsafe-best-match"
resolution = "highest"

[[tool.uv.sources]]
name = "torch"
url = "https://download.pytorch.org/whl/cpu"

[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I", "B", "C4", "UP", "S", "A", "ARG", "SIM"]
ignore = ["E501", "B101"]

[tool.pytest.ini_options]
minversion = "8.0"
addopts = "--cov --cov-report=term-missing -q"
testpaths = ["tests"]

[tool.mypy]
python_version = "3.12"
strict = true
ignore_missing_imports = true

[tool.bandit]
exclude_dirs = ["tests", "data", "docs"]

[tool.coverage.run]
source = ["."]
omit = ["tests/*", "*/test_*"]

[tool.coverage.report]
fail_under = 72
show_missing = true
