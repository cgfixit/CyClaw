[project]
name = "cyclaw"
version = "1.5.0"
description = "Offline-first, RAG-enforced, soul-governed personal AI assistant. Secure local CyClaw with LangGraph invariants and zero telemetry."
readme = "README.md"
requires-python = ">=3.12"
license = {text = "MIT"}
authors = [{name = "Chris Grady (CGFixIT)", email = "chris@cgfixit.com"}]
keywords = ["rag", "ai-agent", "offline", "security", "fastapi", "langgraph", "chromadb", "soul-governance"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
    "Topic :: Security",
    "Framework :: FastAPI",
    "Operating System :: OS Independent",
    "Environment :: Console",
]

dependencies = [
    "fastapi==0.137.2",
    "uvicorn[standard]==0.49.0",
    "pydantic==2.13.4",
    "pyyaml==6.0.3",
    "httpx==0.28.1",
    "langgraph==1.2.5",
    "langchain-core==1.4.7",
    "chromadb==1.5.6",  # CVE-2026-45829 (Critical pre-auth RCE, no upstream patch). Risk accepted ONLY for local/offline air-gapped use via PersistentClient (embedded mode, path from config.yaml). No HttpClient, no trust_remote_code. See SECURITY.md, pip-audit workflow, Docker support in feature/CyClaw-Agent, and cyclaw-advisor §K/§M.
    "sentence-transformers==5.6.0",
    "rank-bm25==0.2.2",
    "numpy==1.26.4",
    "nltk==3.9.4",
]

[project.optional-dependencies]
test = ["pytest==9.1.0", "pytest-asyncio==1.4.0"]
dev = ["ruff", "mypy", "bandit", "pytest-cov"]
torch-cpu = ["torch==2.6.0+cpu"]  # Minimum safe version post CVE-2025-32434 (weights_only=True RCE bypass in torch<2.6). Always prefer safetensors.
full = ["torch==2.6.0+cpu", "pytest==9.1.0", "pytest-asyncio==1.4.0", "ruff", "mypy", "bandit", "pytest-cov"]

[project.scripts]
cyclaw-server = "gate:main"
cyclaw-index = "retrieval.indexer:main"
cyclaw-mcp = "mcp_hybrid_server:main"
cyclaw-metrics = "metrics:main"

[project.urls]
Homepage = "https://github.com/CGFixIT/CyClaw"
Repository = "https://github.com/CGFixIT/CyClaw"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv]
index-strategy = "unsafe-best-match"

[tool.uv.sources]
torch = { index = "pytorch-cpu" }

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

# Recommended: uv lock --upgrade for reproducible lockfile (faster + stricter than requirements.txt)

[tool.ruff]
target-version = "py312"
line-length = 120
exclude = [".claude"]  # skill/utility scripts are not production code

[tool.ruff.lint]
select = ["E", "F", "I", "B", "C4", "UP", "S"]
ignore = ["E501"]
per-file-ignores = { "tests/*" = ["S101", "S603", "S108", "F401", "I001", "S105", "F841", "B007", "C408", "F541", "B904", "E501"], "gate.py" = ["E402", "I001", "B008", "E501"], "graph.py" = ["E501"], "utils/personality.py" = ["S608"] }

[tool.pytest.ini_options]
minversion = "9.1"
addopts = "-ra -q --cov"
testpaths = ["tests"]

[tool.mypy]
python_version = "3.12"
strict = true

[tool.bandit]
exclude_dirs = ["tests"]
skips = ["B101"]

[tool.coverage.run]
source = ["gate", "graph", "mcp_hybrid_server", "metrics", "llm", "retrieval", "utils", "sync", "agentic"]
omit = ["tests/*", "*/test_*", "*/__pycache__/*"]

[tool.coverage.report]
fail_under = 80
show_missing = true
