
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyword Insight Extractor</title>
    <style>
        :root {
            --color-bg-primary: #0f172a;
            --color-bg-secondary: #1e293b;
            --color-bg-surface: #334155;
            --color-text-primary: #f1f5f9;
            --color-text-secondary: #cbd5e1;
            --color-text-muted: #94a3b8;
            --color-accent: #38bdf8;
            --color-accent-hover: #0ea5e9;
            --color-success: #10b981;
            --color-border: rgba(148, 163, 184, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--color-bg-primary);
            color: var(--color-text-primary);
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: var(--color-accent);
        }

        .subtitle {
            color: var(--color-text-secondary);
            font-size: 1rem;
        }

        .card {
            background: var(--color-bg-secondary);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid var(--color-border);
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--color-text-secondary);
        }

        .file-input-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        input[type="file"] {
            display: none;
        }

        .file-input-label {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: var(--color-bg-surface);
            border: 2px dashed var(--color-border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .file-input-label:hover {
            border-color: var(--color-accent);
            background: rgba(56, 189, 248, 0.05);
        }

        .file-input-label.has-file {
            border-color: var(--color-success);
            background: rgba(16, 185, 129, 0.05);
        }

        .file-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .file-text {
            color: var(--color-text-secondary);
        }

        .file-name {
            margin-top: 10px;
            color: var(--color-accent);
            font-weight: 500;
        }

        .slider-group {
            margin-bottom: 24px;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .slider-value {
            background: var(--color-bg-surface);
            padding: 4px 12px;
            border-radius: 6px;
            font-weight: 600;
            color: var(--color-accent);
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            background: var(--color-bg-surface);
            border-radius: 3px;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: var(--color-accent);
            cursor: pointer;
            border-radius: 50%;
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            background: var(--color-accent);
            cursor: pointer;
            border-radius: 50%;
            border: none;
        }

        .btn {
            padding: 14px 32px;
            background: var(--color-accent);
            color: var(--color-bg-primary);
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
            width: 100%;
        }

        .btn:hover {
            background: var(--color-accent-hover);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 3px solid var(--color-bg-surface);
            border-top: 3px solid var(--color-accent);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .results {
            display: none;
        }

        .results.active {
            display: block;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .results-title {
            font-size: 1.5rem;
            color: var(--color-accent);
        }

        .btn-download {
            padding: 10px 20px;
            background: var(--color-success);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }

        .btn-download:hover {
            opacity: 0.9;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--color-bg-surface);
            padding: 16px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--color-accent);
            margin-bottom: 4px;
        }

        .stat-label {
            color: var(--color-text-muted);
            font-size: 0.875rem;
        }

        .insight-item {
            background: var(--color-bg-surface);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 16px;
            border-left: 4px solid var(--color-accent);
        }

        .insight-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .insight-number {
            font-weight: 700;
            color: var(--color-accent);
        }

        .insight-score {
            background: rgba(56, 189, 248, 0.1);
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.875rem;
            color: var(--color-accent);
        }

        .insight-keywords {
            font-size: 0.875rem;
            color: var(--color-text-muted);
            margin-bottom: 12px;
        }

        .insight-text {
            color: var(--color-text-primary);
            line-height: 1.7;
            padding-left: 16px;
            border-left: 2px solid var(--color-border);
        }

        .error {
            display: none;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .error.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔎 Keyword Insight Extractor</h1>
            <p class="subtitle">Extracts lines matching an AI-safety keyword list, ranked by distinct-concept count</p>
        </header>

        <div class="card">
            <form id="uploadForm">
                <div class="form-group">
                    <label>Upload Text File (.txt)</label>
                    <div class="file-input-wrapper">
                        <input type="file" id="fileInput" accept=".txt" required>
                        <label for="fileInput" class="file-input-label" id="fileLabel">
                            <div>
                                <div class="file-icon">📄</div>
                                <div class="file-text">Click to select a .txt file</div>
                                <div class="file-name" id="fileName"></div>
                            </div>
                        </label>
                    </div>
                </div>

                <div class="slider-group">
                    <div class="slider-label">
                        <label>Relevance Threshold</label>
                        <span class="slider-value" id="thresholdValue">0.35</span>
                    </div>
                    <input type="range" id="threshold" min="0.15" max="0.65" step="0.05" value="0.35">
                    <div style="display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--color-text-muted); margin-top: 4px;">
                        <span>More Results</span>
                        <span>Higher Quality</span>
                    </div>
                </div>

                <div class="error" id="errorMsg"></div>

                <button type="submit" class="btn" id="submitBtn">Extract Insights</button>
            </form>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="color: var(--color-text-secondary);">Scanning text for AI-safety keywords...</p>
        </div>

        <div class="results card" id="results">
            <div class="results-header">
                <h2 class="results-title">📊 Extraction Results</h2>
                <button class="btn-download" id="downloadBtn">Download Markdown</button>
            </div>

            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="insightCount">0</div>
                    <div class="stat-label">Insights Found</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalLines">0</div>
                    <div class="stat-label">Total Lines</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="methodUsed">Keyword</div>
                    <div class="stat-label">Method</div>
                </div>
            </div>

            <div id="insightsList"></div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const fileLabel = document.getElementById('fileLabel');
        const fileName = document.getElementById('fileName');
        const thresholdSlider = document.getElementById('threshold');
        const thresholdValue = document.getElementById('thresholdValue');
        const uploadForm = document.getElementById('uploadForm');
        const loading = document.getElementById('loading');
        const results = document.getElementById('results');
        const errorMsg = document.getElementById('errorMsg');
        const downloadBtn = document.getElementById('downloadBtn');

        let extractedInsights = [];
        let totalLinesCount = 0;
        let methodName = 'Keyword';

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                fileName.textContent = file.name;
                fileLabel.classList.add('has-file');
            }
        });

        thresholdSlider.addEventListener('input', (e) => {
            thresholdValue.textContent = e.target.value;
        });

        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const file = fileInput.files[0];
            if (!file) {
                showError('Please select a file');
                return;
            }

            errorMsg.classList.remove('active');
            results.classList.remove('active');
            loading.classList.add('active');

            try {
                const text = await file.text();
                const threshold = parseFloat(thresholdSlider.value);
                
                const insights = extractInsightsByKeyword(text, threshold);

                extractedInsights = insights;
                totalLinesCount = text.split('\n').filter(l => l.trim()).length;
                methodName = 'Keyword';
                
                displayResults(insights, totalLinesCount, methodName);
                
            } catch (error) {
                showError('Error processing file: ' + error.message);
            } finally {
                loading.classList.remove('active');
            }
        });

        // Honest naming: this is keyword substring matching, not BERT/embeddings.
        // The relevance score is DETERMINISTIC -- identical input always yields the
        // same score and ordering (the previous Math.random() variation made the
        // score and sort order change on every run for the same file).
        function extractInsightsByKeyword(text, threshold) {
            const keywords = [
                'alignment', 'safety', 'ethics', 'bias', 'fairness', 'transparency',
                'interpretability', 'robustness', 'security', 'privacy', 'regulation',
                'governance', 'accountability', 'risk', 'control', 'autonomous',
                'superintelligence', 'AGI', 'existential', 'reward', 'objective',
                'optimization', 'misalignment', 'deception', 'adversarial', 'explainable'
            ];

            const lines = text.split('\n').filter(l => l.trim());
            const metadataPattern = /^(\[.*?\]\s+\w+:)\s+(.*)$/;
            const insights = [];

            for (let line of lines) {
                line = line.trim();
                if (!line) continue;

                const match = line.match(metadataPattern);
                const message = match ? match[2] : line;
                
                const lowerMessage = message.toLowerCase();
                const matchedKeywords = [];

                for (const keyword of keywords) {
                    if (lowerMessage.includes(keyword.toLowerCase())) {
                        matchedKeywords.push(keyword);
                    }
                }

                if (matchedKeywords.length > 0) {
                    const distinct = [...new Set(matchedKeywords)];
                    // Deterministic relevance: 0.35 base for a single matched
                    // concept, +0.07 per additional distinct concept, capped at
                    // 0.95. Monotonic in concept count, reproducible run-to-run.
                    const score = Math.min(0.35 + 0.07 * (distinct.length - 1), 0.95);
                    if (score >= threshold) {
                        insights.push({
                            text: line,
                            score: score,
                            keywords: distinct.slice(0, 3)
                        });
                    }
                }
            }

            insights.sort((a, b) => b.score - a.score);
            return insights;
        }

        function displayResults(insights, totalLines, method) {
            document.getElementById('insightCount').textContent = insights.length;
            document.getElementById('totalLines').textContent = totalLines;
            document.getElementById('methodUsed').textContent = method;

            const insightsList = document.getElementById('insightsList');
            insightsList.innerHTML = '';

            if (insights.length === 0) {
                insightsList.innerHTML = '<p style="text-align: center; color: var(--color-text-muted); padding: 40px;">No insights found. Try lowering the threshold.</p>';
            } else {
                insights.forEach((insight, idx) => {
                    const item = document.createElement('div');
                    item.className = 'insight-item';
                    item.innerHTML = `
                        <div class="insight-header">
                            <span class="insight-number">Insight #${idx + 1}</span>
                            <span class="insight-score">Relevance: ${insight.score.toFixed(2)}</span>
                        </div>
                        <div class="insight-keywords">Matched concepts: ${insight.keywords.join(', ')}</div>
                        <div class="insight-text">${escapeHtml(insight.text)}</div>
                    `;
                    insightsList.appendChild(item);
                });
            }

            results.classList.add('active');
        }

        function showError(message) {
            errorMsg.textContent = message;
            errorMsg.classList.add('active');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        downloadBtn.addEventListener('click', () => {
            const markdown = generateMarkdown(extractedInsights, totalLinesCount, methodName);
            const blob = new Blob([markdown], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `insights_${methodName.toLowerCase()}_${Date.now()}.md`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

        function generateMarkdown(insights, totalLines, method) {
            let md = '# Insights from AI Thread\n\n';
            md += `## Extraction Method: ${method.toUpperCase()}\n\n`;
            md += '## Summary\n';
            md += `Extracted **${insights.length}** insights from **${totalLines}** lines.\n\n`;
            md += '**Keyword matching**: Lines containing AI-safety keywords, ranked by distinct-concept count.\n\n';
            md += '## Extracted Insights\n\n';

            insights.forEach((insight, idx) => {
                md += `### Insight ${idx + 1} (Relevance: ${insight.score.toFixed(2)})\n`;
                md += `**Matched concepts**: ${insight.keywords.join(', ')}\n\n`;
                md += `> ${insight.text}\n\n`;
            });

            return md;
        }
    </script>
</body>
</html>
