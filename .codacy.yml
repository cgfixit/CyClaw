# CyClaw .codacy.yml — keep the invariants code clean
exclude_paths:
  - "data/**"          # RAG corpus + soul.md noise
  - "docs/**"          # PDFs, old guides, screenshots
  - "static/**"        # terminal.html / frontend
  - "**/tests/**"      # fixtures don't need static analysis
  - "**/*.md"          # markdownlint spam on READMEs/docs
  - "results.sarif"    # generated artifact
